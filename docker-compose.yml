services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file:
      - path: .env.docker
        required: false
    container_name: tariff-agent-backend
    environment:
      APP_ENV: docker
      GEMINI_MODEL: gemini-2.5-flash
      OUTPUT_DIR: /app/data/output
      INPUT_EXCEL_PATH: /app/data/input/tariff_packs.xlsx
      CHROMA_DIR: /app/data/chroma
    ports:
      - "8000:8000"
    volumes:
      - ./data/output:/app/data/output
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    container_name: tariff-agent-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
